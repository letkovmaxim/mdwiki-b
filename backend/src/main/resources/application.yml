spring:
  datasource:
    url: 'jdbc:h2:mem:test'
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 10MB
      max-request-size: 10MB
server:
  error:
    include-message: always
    include-binding-errors: always